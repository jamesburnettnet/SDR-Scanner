<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3d42"/>
      <stop offset="1" stop-color="#141518"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1a12"/>
      <stop offset="1" stop-color="#050a07"/>
    </linearGradient>
  </defs>

  <rect x="8" y="8" width="240" height="240" rx="36" fill="url(#bezel)"/>
  <rect x="26" y="34" width="204" height="150" rx="14" fill="url(#screen)"/>

  <!-- signal bars, evoking the strip-chart / meter -->
  <g fill="#5ceb8c">
    <rect x="46" y="140" width="18" height="24" rx="2"/>
    <rect x="72" y="120" width="18" height="44" rx="2"/>
    <rect x="98" y="100" width="18" height="64" rx="2"/>
    <rect x="124" y="80"  width="18" height="84" rx="2"/>
    <rect x="150" y="110" width="18" height="54" rx="2"/>
    <rect x="176" y="130" width="18" height="34" rx="2"/>
  </g>

  <!-- squelch threshold line -->
  <line x1="46" y1="96" x2="194" y2="96" stroke="#c9a53c" stroke-width="3" stroke-dasharray="8 6"/>

  <!-- frequency readout -->
  <rect x="26" y="196" width="204" height="34" rx="8" fill="#0a120d"/>
  <text x="128" y="220" font-family="monospace" font-size="20" font-weight="bold"
        fill="#8cffb0" text-anchor="middle">462.5625</text>
</svg>
