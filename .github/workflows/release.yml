name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

jobs:
  # Computed exactly once and passed to every build job as a job output,
  # rather than each job independently re-deriving it from
  # github.ref_type/GITHUB_REF_NAME -- three separate copies of that logic
  # previously produced different answers within the same run (two jobs
  # got the tag version, one fell back to "0.0.0-dev"), which shouldn't be
  # possible if those context values are consistent across jobs in a run,
  # but evidently wasn't reliable in practice. Reading the version back
  # from the actual checked-out git state (git describe) sidesteps
  # whatever that inconsistency was instead of trying to explain it.
  determine-version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Determine version from tag
        id: version
        run: |
          VERSION=$(git describe --tags --exact-match --match 'v*' 2>/dev/null | sed 's/^v//' || true)
          if [ -z "$VERSION" ]; then
            # Not an exact-tag checkout, e.g. a manual workflow_dispatch run
            # off a branch -- fall back to the version baked into
            # CMakeLists.txt's project() declaration instead of a
            # meaningless 0.0.0-dev placeholder.
            VERSION=$(grep -m1 -oE 'VERSION [0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt | awk '{print $2}')
          fi
          if [ -z "$VERSION" ]; then
            VERSION="0.0.0-dev"
          fi
          echo "Resolved version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-deb-debian13:
    name: Build .deb (Debian 13 / Qt6)
    needs: determine-version
    runs-on: ubuntu-latest
    container:
      image: debian:13
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential cmake git ca-certificates \
            qt6-base-dev qt6-base-dev-tools qt6-multimedia-dev \
            librtlsdr-dev libusb-1.0-0-dev \
            dpkg-dev file

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DOS_TAG=deb13 -DCPACK_GENERATOR=DEB \
            -DAPP_VERSION=${{ needs.determine-version.outputs.version }}
          cmake --build build --parallel "$(nproc)"

      - name: Run self-test
        run: QT_QPA_PLATFORM=offscreen ./build/sdr-scanner --test

      - name: Package
        working-directory: build
        run: cpack

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: deb-debian13
          path: build/*.deb
          if-no-files-found: error

  build-deb-ubuntu26:
    name: Build .deb (Ubuntu 26.04 / Qt6)
    needs: determine-version
    runs-on: ubuntu-latest
    container:
      image: ubuntu:26.04
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential cmake git ca-certificates \
            qt6-base-dev qt6-base-dev-tools qt6-multimedia-dev \
            librtlsdr-dev libusb-1.0-0-dev \
            dpkg-dev file

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DOS_TAG=ub2604 -DCPACK_GENERATOR=DEB \
            -DAPP_VERSION=${{ needs.determine-version.outputs.version }}
          cmake --build build --parallel "$(nproc)"

      - name: Run self-test
        run: QT_QPA_PLATFORM=offscreen ./build/sdr-scanner --test

      - name: Package
        working-directory: build
        run: cpack

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: deb-ubuntu26
          path: build/*.deb
          if-no-files-found: error

  build-rpm:
    name: Build .rpm (Fedora 44 / Qt6)
    needs: determine-version
    runs-on: ubuntu-latest
    container:
      image: fedora:44
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          dnf install -y \
            gcc-c++ cmake git \
            qt6-qtbase-devel qt6-qtmultimedia-devel \
            rtl-sdr-devel libusb1-devel \
            rpm-build file

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DOS_TAG=fed44 -DCPACK_GENERATOR=RPM \
            -DAPP_VERSION=${{ needs.determine-version.outputs.version }}
          cmake --build build --parallel "$(nproc)"

      - name: Run self-test
        run: QT_QPA_PLATFORM=offscreen ./build/sdr-scanner --test

      - name: Package
        working-directory: build
        run: cpack

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: rpm-package
          path: build/*.rpm
          if-no-files-found: error

  build-windows-zip:
    name: Build .zip (Windows / Qt6 MinGW)
    needs: determine-version
    runs-on: windows-latest
    env:
      QT_VERSION: "6.9.3"
      MINGW_TOOL: "tools_mingw1310"
      MINGW_DIR: "mingw1310_64"
    steps:
      - uses: actions/checkout@v7

      - name: Cache Qt + MinGW toolchain
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: C:\Qt
          key: qt-${{ env.QT_VERSION }}-${{ env.MINGW_TOOL }}-v1

      - name: Install aqtinstall
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: pip install aqtinstall

      - name: Install Qt6 (MinGW)
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: python -m aqt install-qt windows desktop ${{ env.QT_VERSION }} win64_mingw -O C:\Qt -m qtmultimedia

      - name: Install matching MinGW toolchain
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: python -m aqt install-tool windows desktop ${{ env.MINGW_TOOL }} -O C:\Qt

      - name: Build
        run: |
          $env:PATH = "C:\Qt\Tools\${{ env.MINGW_DIR }}\bin;$env:PATH"
          cmake -S . -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH=C:\Qt\${{ env.QT_VERSION }}\mingw_64 `
            -DAPP_VERSION=${{ needs.determine-version.outputs.version }}
          cmake --build build -j

      - name: Run self-test
        run: .\build\sdr-scanner.exe --test

      - name: Package
        run: |
          $env:PATH = "C:\Qt\Tools\${{ env.MINGW_DIR }}\bin;$env:PATH"
          cmake --install build --prefix dist\sdr-scanner
          Compress-Archive -Path dist\sdr-scanner\bin\* `
            -DestinationPath dist\sdr-scanner-${{ needs.determine-version.outputs.version }}-win64.zip

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: windows-zip
          path: dist\*.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-deb-debian13, build-deb-ubuntu26, build-rpm, build-windows-zip]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8

      # GitHub's "immutable releases" only allow asset uploads before a
      # release is published -- create it as a draft first (so each of the
      # 4 build jobs' assets can attach), then explicitly publish it as a
      # separate step below once everything is uploaded.
      - name: Publish GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            deb-debian13/*.deb
            deb-ubuntu26/*.deb
            rpm-package/*.rpm
            windows-zip/*.zip
          generate_release_notes: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ github.ref_name }}" --draft=false --repo "${{ github.repository }}"
