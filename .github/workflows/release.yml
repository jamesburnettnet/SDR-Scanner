name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

jobs:
  build-deb-debian13:
    name: Build .deb (Debian 13 / Qt6)
    runs-on: ubuntu-latest
    container:
      image: debian:13
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential cmake git ca-certificates \
            qt6-base-dev qt6-base-dev-tools qt6-multimedia-dev \
            librtlsdr-dev libusb-1.0-0-dev \
            dpkg-dev file

      - name: Determine version from tag
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DOS_TAG=deb13 -DCPACK_GENERATOR=DEB \
            -DAPP_VERSION=${{ steps.version.outputs.version }}
          cmake --build build --parallel "$(nproc)"

      - name: Run self-test
        run: QT_QPA_PLATFORM=offscreen ./build/sdr-scanner --test

      - name: Package
        working-directory: build
        run: cpack

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: deb-debian13
          path: build/*.deb
          if-no-files-found: error

  build-deb-ubuntu26:
    name: Build .deb (Ubuntu 26.04 / Qt6)
    runs-on: ubuntu-latest
    container:
      image: ubuntu:26.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential cmake git ca-certificates \
            qt6-base-dev qt6-base-dev-tools qt6-multimedia-dev \
            librtlsdr-dev libusb-1.0-0-dev \
            dpkg-dev file

      - name: Determine version from tag
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DOS_TAG=ub2604 -DCPACK_GENERATOR=DEB \
            -DAPP_VERSION=${{ steps.version.outputs.version }}
          cmake --build build --parallel "$(nproc)"

      - name: Run self-test
        run: QT_QPA_PLATFORM=offscreen ./build/sdr-scanner --test

      - name: Package
        working-directory: build
        run: cpack

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: deb-ubuntu26
          path: build/*.deb
          if-no-files-found: error

  build-rpm:
    name: Build .rpm (Fedora 44 / Qt6)
    runs-on: ubuntu-latest
    container:
      image: fedora:44
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y \
            gcc-c++ cmake git \
            qt6-qtbase-devel qt6-qtmultimedia-devel \
            rtl-sdr-devel libusb1-devel \
            rpm-build file

      - name: Determine version from tag
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DOS_TAG=fed44 -DCPACK_GENERATOR=RPM \
            -DAPP_VERSION=${{ steps.version.outputs.version }}
          cmake --build build --parallel "$(nproc)"

      - name: Run self-test
        run: QT_QPA_PLATFORM=offscreen ./build/sdr-scanner --test

      - name: Package
        working-directory: build
        run: cpack

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: build/*.rpm
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-deb-debian13, build-deb-ubuntu26, build-rpm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            deb-debian13/*.deb
            deb-ubuntu26/*.deb
            rpm-package/*.rpm
          generate_release_notes: true
