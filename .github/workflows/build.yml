name: Build and Package

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  # Each Linux target builds inside a Docker container matching that exact
  # OS/version, rather than relying on GitHub's native runner images --
  # GitHub doesn't host Fedora runners at all, and pinning to a container
  # image is the only reliable way to build against a specific distro's own
  # Qt6 packages (which is what "Built on the version of Qt supported by
  # each OS" means here: whatever qt6-base-dev resolves to on that distro,
  # not a hand-picked version).
  build-linux:
    name: Build (${{ matrix.os_tag }})
    runs-on: ubuntu-latest
    container: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_tag: deb13
            image: debian:13
            family: debian
            generator: DEB
            pkg_ext: deb
          - os_tag: ub2604
            image: ubuntu:26.04
            family: debian
            generator: DEB
            pkg_ext: deb
          - os_tag: fed44
            image: fedora:44
            family: fedora
            generator: RPM
            pkg_ext: rpm
    steps:
      - name: Install build dependencies (Debian/Ubuntu)
        if: matrix.family == 'debian'
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential cmake git ca-certificates \
            qt6-base-dev qt6-base-dev-tools qt6-multimedia-dev \
            librtlsdr-dev libusb-1.0-0-dev \
            dpkg-dev file

      - name: Install build dependencies (Fedora)
        if: matrix.family == 'fedora'
        run: |
          dnf install -y \
            gcc-c++ cmake git \
            qt6-qtbase-devel qt6-qtmultimedia-devel \
            rtl-sdr-devel libusb1-devel \
            rpm-build file

      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          -DOS_TAG=${{ matrix.os_tag }}
          -DCPACK_GENERATOR=${{ matrix.generator }}

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Run self-test
        run: QT_QPA_PLATFORM=offscreen ./build/sdr-scanner --test

      - name: Package
        working-directory: build
        run: cpack

      - name: Stage package for upload
        run: |
          mkdir -p dist
          cp build/*.${{ matrix.pkg_ext }} dist/

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: sdr-scanner-${{ matrix.os_tag }}
          path: dist/*
          if-no-files-found: error

  # Installs each just-built package into a *fresh* container of the same
  # OS (not the one that built it) and confirms it installs cleanly with
  # its declared dependencies alone, and that the installed binary runs.
  test-install-linux:
    name: Test install (${{ matrix.os_tag }})
    needs: build-linux
    runs-on: ubuntu-latest
    container: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_tag: deb13
            image: debian:13
            family: debian
          - os_tag: ub2604
            image: ubuntu:26.04
            family: debian
          - os_tag: fed44
            image: fedora:44
            family: fedora
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v8
        with:
          name: sdr-scanner-${{ matrix.os_tag }}
          path: pkg

      - name: Install package (Debian/Ubuntu)
        if: matrix.family == 'debian'
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y ./pkg/*.deb

      - name: Install package (Fedora)
        if: matrix.family == 'fedora'
        run: dnf install -y ./pkg/*.rpm

      - name: Verify installed files
        run: |
          test -x /usr/bin/sdr-scanner
          test -f /usr/share/applications/sdr-scanner.desktop
          test -f /usr/share/icons/hicolor/scalable/apps/sdr-scanner.svg
          echo "All expected files present."

      - name: Run self-test on the installed binary
        run: QT_QPA_PLATFORM=offscreen /usr/bin/sdr-scanner --test

  # Qt has no distro package manager to lean on for Windows the way the
  # Linux jobs do, so this installs Qt6 (MinGW build) and its matching
  # MinGW-w64 13.1.0 compiler via aqtinstall -- the same tool the Qt online
  # installer itself uses, just scriptable. The compiler version has to
  # match what Qt's win64_mingw kit was built with (ABI compatibility, not
  # just "any mingw will do"); librtlsdr and its headers are vendored
  # under lib/ instead (see lib/README.md), since there's nothing to
  # install there either.
  build-windows:
    name: Build (windows)
    runs-on: windows-latest
    env:
      QT_VERSION: "6.9.3"
      MINGW_TOOL: "tools_mingw1310"
      MINGW_DIR: "mingw1310_64"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache Qt + MinGW toolchain
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: C:\Qt
          key: qt-${{ env.QT_VERSION }}-${{ env.MINGW_TOOL }}-v1

      - name: Install aqtinstall
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: pip install aqtinstall

      - name: Install Qt6 (MinGW)
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: python -m aqt install-qt windows desktop ${{ env.QT_VERSION }} win64_mingw -O C:\Qt -m qtmultimedia

      - name: Install matching MinGW toolchain
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: python -m aqt install-tool windows desktop ${{ env.MINGW_TOOL }} -O C:\Qt

      - name: Configure
        run: |
          $env:PATH = "C:\Qt\Tools\${{ env.MINGW_DIR }}\bin;$env:PATH"
          cmake -S . -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH=C:\Qt\${{ env.QT_VERSION }}\mingw_64

      - name: Build
        run: |
          $env:PATH = "C:\Qt\Tools\${{ env.MINGW_DIR }}\bin;$env:PATH"
          cmake --build build -j

      - name: Run self-test
        run: .\build\sdr-scanner.exe --test

      - name: Package
        run: |
          $env:PATH = "C:\Qt\Tools\${{ env.MINGW_DIR }}\bin;$env:PATH"
          cmake --install build --prefix dist\sdr-scanner

      # Upload the raw install output, not a pre-made .zip: actions/upload-artifact
      # always wraps whatever it's given in its own zip for download, so
      # pre-zipping here produced a zip-of-a-zip when downloaded from the
      # Actions tab (the actual release .zip is assembled separately in
      # release.yml, from this same raw output).
      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: sdr-scanner-windows
          path: dist\sdr-scanner\bin\*
          if-no-files-found: error

  # Same idea as test-install-linux: run the just-built output on a fresh
  # runner (no leftover Qt/MinGW/PATH from the build job) and confirm the
  # binary runs standalone with nothing else installed.
  test-install-windows:
    name: Test install (windows)
    needs: build-windows
    runs-on: windows-latest
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v8
        with:
          name: sdr-scanner-windows
          path: pkg

      - name: Run self-test on the downloaded binary
        run: .\pkg\sdr-scanner.exe --test
